<body>
    <script>
    function despedir(nombre) {
    return `Adiós, ${nombre}!`;
    }

    function multiplicar(a, b) {
    return a * b;
    }

    function esMayorDeEdad(edad) {
    return edad >= 18;
    }

    console.log(despedir("Carlos"));
    console.log(multiplicar(4, 6));
    console.log(esMayorDeEdad(20));
    console.log(esMayorDeEdad(15));
    </script>
